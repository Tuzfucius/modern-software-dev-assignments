<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>现代软件开发入门</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main>
      <h1>现代软件开发入门（第6周）</h1>

      <section>
        <h2>笔记</h2>
        <form id="note-form">
          <input id="note-title" placeholder="标题" required />
          <input id="note-content" placeholder="内容" required />
          <button type="submit">添加</button>
        </form>
        <div style="margin:.25rem 0;">
          <input id="note-search" placeholder="搜索" />
          <button id="note-search-btn">搜索</button>
        </div>
        <ul id="notes"></ul>
      </section>

      <section>
        <h2>待办事项</h2>
        <form id="action-form">
          <input id="action-desc" placeholder="描述" required />
          <button type="submit">添加</button>
        </form>
        <div style="margin:.25rem 0;">
          <label><input type="checkbox" id="filter-completed" /> 仅显示已完成的</label>
        </div>
        <ul id="actions"></ul>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
  </html>
